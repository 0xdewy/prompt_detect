version: '3.8'

services:
  prompt-detective:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - FACILITATOR_URL=${FACILITATOR_URL:-https://api.cdp.coinbase.com/platform/v2/x402}
      - NETWORK=${NETWORK:-eip155:8453}
      - PRICE=${PRICE:-$0.01}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      # Mount model directory if models are stored separately
      # - ./models:/app/models:ro
      # Mount logs directory
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - prompt-detective-network

  # Optional: Nginx reverse proxy for SSL termination
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - prompt-detective
    restart: unless-stopped
    networks:
      - prompt-detective-network

networks:
  prompt-detective-network:
    driver: bridge

volumes:
  logs:
  models: